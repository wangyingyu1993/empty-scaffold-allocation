# Dataset configuration for empty-scaffold allocation analyses.
# Update paths after downloading the original data.

raw_data:
  moleculenet:
    source: "https://moleculenet.org/datasets-1"
    local_dir: "data/raw/moleculenet"
  deeppk_admet:
    source: "https://biosig.lab.uq.edu.au/deeppk/data"
    local_dir: "data/raw/deeppk_admet"

processed_data:
  root: "data/processed"
  no_scaffold_min_proportion: 0.08
  directories:
    moleculenet_classification: "data/processed/moleculenet/classification"
    moleculenet_regression: "data/processed/moleculenet/regression"
    admet_classification: "data/processed/admet/classification"
    admet_regression: "data/processed/admet/regression"

columns:
  smiles: "molecules"

benchmarks:
  moleculenet:
    display_name: "MoleculeNet"
    prediction_groups:
      classification: []
      regression: []
  admet:
    display_name: "Deep-PK/ADMET"
    prediction_groups:
      classification: []
      regression: []
