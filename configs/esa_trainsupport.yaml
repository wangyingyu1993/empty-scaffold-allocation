# ESA-TrainSupport configuration.
# Primary configuration used in the main-text ESA analyses.

name: "ESA-TrainSupport"
short_name: "D_train_support_priority"
purpose: "Train-support-priority repair"

fingerprint:
  radius: 2
  n_bits: 2048
  use_chirality: true

micro_clustering:
  tanimoto_threshold: 0.40
  max_cluster_fraction: 0.80

assignment:
  greedy_weights:
    cross_branch_no_scaffold_similarity: 0.5
    validation_train_similarity: 1.0
    test_train_similarity: 1.5
    split_size_imbalance: 0.03
  lower_bounds:
    train: 0.90
    valid: 0.40
    test: 0.40
  drop_budget: 0.05
  similarity_sampling_cap: 16

outputs:
  write_assignment_audit: true
  write_cluster_summary: true
  write_split_diagnostics: true
