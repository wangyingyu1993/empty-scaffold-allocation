# ESA-Balanced configuration.
# Conservative balanced repair baseline retained after preliminary screening.

name: "ESA-Balanced"
short_name: "A_balanced_baseline"
purpose: "Balanced repair baseline"

fingerprint:
  radius: 2
  n_bits: 2048
  use_chirality: true

micro_clustering:
  tanimoto_threshold: 0.40
  max_cluster_fraction: 0.70

assignment:
  greedy_weights:
    cross_branch_no_scaffold_similarity: 1.0
    validation_train_similarity: 1.0
    test_train_similarity: 1.0
    split_size_imbalance: 0.05
  lower_bounds:
    train: 0.80
    valid: 0.50
    test: 0.50
  drop_budget: 0.05
  similarity_sampling_cap: 16

outputs:
  write_assignment_audit: true
  write_cluster_summary: true
  write_split_diagnostics: true
